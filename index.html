<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latin Addiction — Homepage Design Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Tab navigation (desktop) */
    .tabs {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-group {
      display: flex;
      align-items: stretch;
    }
    .tab-group + .tab-group::before {
      content: '';
      width: 1px;
      background: #e0e0e0;
      margin: 0.6rem 0;
    }
    .tab {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: #666;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
      font-family: inherit;
    }
    .tab:hover { color: #1a1a1a; background: #fafafa; }
    .tab.active {
      color: #1a1a1a;
      font-weight: 600;
      border-bottom-color: #1a1a1a;
    }

    /* Preview iframe */
    .preview {
      flex: 1;
      position: relative;
      background: #e8e8e8;
    }
    .preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      inset: 0;
    }
    .preview-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.9rem;
    }

    /* Floating design switcher (mobile) */
    .fab {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #fff;
      border: none;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      transition: transform 0.2s, background 0.2s;
      font-size: 1.4rem;
      line-height: 1;
    }
    .fab:hover { background: #333; }
    .fab.open { transform: rotate(45deg); }

    .fab-menu {
      display: none;
      position: fixed;
      bottom: 5rem;
      right: 1.5rem;
      background: #1a1a1a;
      border-radius: 14px;
      padding: 0.5rem 0;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      min-width: 180px;
    }
    .fab-menu.open { display: block; }
    .fab-item {
      display: block;
      width: 100%;
      padding: 0.7rem 1.25rem;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
    }
    .fab-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .fab-item.active {
      color: #fff;
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .tabs { display: none; }
      .fab { display: flex; align-items: center; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Desktop tabs -->
  <div class="tabs" role="tablist">
    <div class="tab-group">
      <button class="tab active" role="tab" data-design="homepage-design-01v1.html">Warm Earthy</button>
      <button class="tab" role="tab" data-design="homepage-design-01v2.html">Cream Navy</button>
      <button class="tab" role="tab" data-design="homepage-design-01v3.html">Teal Coral</button>
      <button class="tab" role="tab" data-design="homepage-design-02v3.html">Broadway Rose</button>
    </div>
    <div class="tab-group">
      <button class="tab" role="tab" data-design="homepage-design-02v1.html">Dark Gold</button>
      <button class="tab" role="tab" data-design="homepage-design-02v2.html">Sunset Fire</button>
    </div>
    <div class="tab-group">
      <button class="tab" role="tab" data-design="homepage-design-03v1.html">Mono Brutalist</button>
      <button class="tab" role="tab" data-design="homepage-design-03v2.html">Dark Elegant</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview">
    <div class="preview-loading" id="loading">Loading design...</div>
    <iframe id="preview-frame" title="Design preview"></iframe>
  </div>

  <!-- Mobile floating button + menu -->
  <button class="fab" id="fab" aria-label="Switch design">+</button>
  <div class="fab-menu" id="fab-menu">
    <button class="fab-item active" data-design="homepage-design-01v1.html">Warm Earthy</button>
    <button class="fab-item" data-design="homepage-design-01v2.html">Cream Navy</button>
    <button class="fab-item" data-design="homepage-design-01v3.html">Teal Coral</button>
    <button class="fab-item" data-design="homepage-design-02v3.html">Broadway Rose</button>
    <button class="fab-item" data-design="homepage-design-02v1.html">Dark Gold</button>
    <button class="fab-item" data-design="homepage-design-02v2.html">Sunset Fire</button>
    <button class="fab-item" data-design="homepage-design-03v1.html">Mono Brutalist</button>
    <button class="fab-item" data-design="homepage-design-03v2.html">Dark Elegant</button>
  </div>

  <script>
    const frame = document.getElementById('preview-frame');
    const loading = document.getElementById('loading');
    const tabs = document.querySelectorAll('.tab');
    const fab = document.getElementById('fab');
    const fabMenu = document.getElementById('fab-menu');
    const fabItems = document.querySelectorAll('.fab-item');

    function loadDesign(file) {
      loading.style.display = 'flex';
      frame.style.opacity = '0';
      frame.src = 'designs/' + file;
    }

    frame.addEventListener('load', () => {
      loading.style.display = 'none';
      frame.style.opacity = '1';
    });

    // Desktop tabs
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        fabItems.forEach(f => f.classList.toggle('active', f.dataset.design === tab.dataset.design));
        loadDesign(tab.dataset.design);
      });
    });

    // Mobile FAB
    fab.addEventListener('click', () => {
      fab.classList.toggle('open');
      fabMenu.classList.toggle('open');
    });

    fabItems.forEach(item => {
      item.addEventListener('click', () => {
        const file = item.dataset.design;
        fabItems.forEach(f => f.classList.remove('active'));
        item.classList.add('active');
        tabs.forEach(t => t.classList.toggle('active', t.dataset.design === file));
        loadDesign(file);
        fab.classList.remove('open');
        fabMenu.classList.remove('open');
      });
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!fab.contains(e.target) && !fabMenu.contains(e.target)) {
        fab.classList.remove('open');
        fabMenu.classList.remove('open');
      }
    });

    // Load first design on page load
    loadDesign('homepage-design-01v1.html');
  </script>
</body>
</html>
